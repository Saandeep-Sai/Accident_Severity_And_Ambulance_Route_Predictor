name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Install huggingface_hub CLI for xet support
          pip install -q huggingface_hub[hf_xet]

          # Login
          huggingface-cli login --token $HF_TOKEN

          # Upload entire repo to the Space
          huggingface-cli upload saandeepsai/Accident_severity_predictor . . --repo-type space
